<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客详情</title>
    <script src="/Static/Script/global-notifications.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f6f6f6;
            padding: 24px;
            color: #333;
            line-height: 1.5;
        }
        
        .page-header {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .page-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: #111;
        }
        
        .page-description {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }
        
        .back-button {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #666;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        
        .back-button:hover {
            background: #e9ecef;
            border-color: #dee2e6;
            color: #333;
        }
        
        .back-button svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
        
        .loading {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }
        
        .error {
            background: #fff2f2;
            border: 1px solid #ffd6d6;
            border-radius: 8px;
            padding: 14px;
            color: #d93030;
            margin-bottom: 20px;
        }
        
        .info-card {
            background: #fff;
            border-radius: 12px;
            padding: 22px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        
        .blog-title {
            font-size: 24px;
            font-weight: 600;
            color: #111;
            margin-bottom: 16px;
            line-height: 1.3;
        }
        
        .blog-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f2f2f2;
            font-size: 13px;
            color: #666;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .meta-item svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        
        .blog-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .tag {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            color: #666;
        }
        
        .blog-content {
            font-size: 15px;
            line-height: 1.6;
            color: #333;
        }
        
        .content-block {
            margin-bottom: 16px;
        }
        
        .text-block {
            color: #333;
        }
        
        .code-block {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 12px;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            overflow-x: auto;
        }
        
        .code-block pre {
            margin: 0;
            white-space: pre-wrap;
        }
        
        .image-block {
            text-align: center;
            margin: 20px 0;
        }
        
        .image-block img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .no-content {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }
        
        .not-found {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .not-found h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #111;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div>
            <h2>博客详情</h2>
            <p class="page-description">查看博客详细内容</p>
        </div>
        <a href="javascript:history.back()" class="back-button">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <polyline points="15,18 9,12 15,6"/>
            </svg>
            返回
        </a>
    </div>
    
    <div id="content">
        <div class="loading">正在加载博客内容...</div>
    </div>

<script>
    /**
     * 初始化页面
     */
    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const blogId = urlParams.get('id');
        
        if (!blogId) {
            showNotFound();
            return;
        }
        
        // 使用多种连接方式，适配不同环境
        const endpoints = [
            `http://127.0.0.1:5726/content/blogs/${blogId}`,
            `http://localhost:5726/content/blogs/${blogId}`,
            `/content/blogs/${blogId}`
        ];
        
        let response = null;
        let lastError = null;
        
        for (const endpoint of endpoints) {
            try {
                console.log(`尝试连接博客详情端点: ${endpoint}`);
                response = await fetch(endpoint);
                if (response.ok) {
                    console.log(`✅ 博客详情连接成功: ${endpoint}`);
                    break;
                }
            } catch (err) {
                console.log(`❌ 博客详情连接失败: ${endpoint}`, err.message);
                lastError = err;
            }
        }
        
        if (!response || !response.ok) {
            console.error('所有博客详情连接方式都失败了', lastError);
            showError('无法连接到服务器，请检查网络连接');
            return;
        }
        
        try {
            const result = await response.json();
            
            if (result.success && result.data) {
                displayBlog(result.data);
            } else if (response.status === 404) {
                showNotFound();
            } else {
                showError(result.message || '加载失败');
            }
        } catch (error) {
            console.error('解析博客数据失败:', error);
            showError('数据解析失败，请稍后重试');
        }
    }
    
    /**
     * 显示博客内容
     */
    function displayBlog(blog) {
        const content = document.getElementById('content');
        
        const html = `
            <div class="info-card">
                <h1 class="blog-title">${escapeHtml(blog.title || '无标题')}</h1>
                
                <div class="blog-meta">
                    <div class="meta-item">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span>${escapeHtml(blog.author || '匿名用户')}</span>
                    </div>
                    <div class="meta-item">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        <span>${formatDate(blog.createdAt)}</span>
                    </div>
                    <div class="meta-item">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <span>${blog.views || 0} 次浏览</span>
                    </div>
                    <div class="meta-item">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                        <span>${blog.likes || 0} 个点赞</span>
                    </div>
                </div>
                
                ${blog.tags && blog.tags.length > 0 ? `
                    <div class="blog-tags">
                        ${blog.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
                    </div>
                ` : ''}
                
                <div class="blog-content">
                    ${blog.content && blog.content.length > 0 ? 
                        blog.content.map(block => renderContentBlock(block)).join('') :
                        '<div class="no-content">暂无内容</div>'
                    }
                </div>
            </div>
        `;
        
        content.innerHTML = html;
    }
    
    /**
     * 渲染内容块
     */
    function renderContentBlock(block) {
        switch (block.type) {
            case 'text':
                return `<div class="content-block text-block">${escapeHtml(block.content).replace(/\n/g, '<br>')}</div>`;
            
            case 'code':
                return `<div class="content-block code-block"><pre>${escapeHtml(block.content)}</pre></div>`;
            
            case 'image':
                return `
                    <div class="content-block image-block">
                        <img src="${escapeHtml(block.content)}" alt="图片" />
                    </div>
                `;
            
            default:
                return `<div class="content-block text-block">${escapeHtml(block.content)}</div>`;
        }
    }
    
    /**
     * 显示错误信息
     */
    function showError(message) {
        const content = document.getElementById('content');
        content.innerHTML = `
            <div class="error">
                <strong>加载失败</strong><br>
                ${message}
            </div>
        `;
    }
    
    /**
     * 显示未找到信息
     */
    function showNotFound() {
        const content = document.getElementById('content');
        content.innerHTML = `
            <div class="not-found">
                <h3>博客未找到</h3>
                <p>该博客可能已被删除或链接有误</p>
            </div>
        `;
    }
    
    /**
     * HTML转义
     */
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    /**
     * 格式化日期
     */
    function formatDate(dateString) {
        if (!dateString) return '未知时间';
        
        try {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            // 小于1分钟
            if (diff < 60000) return '刚刚';
            
            // 小于1小时
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            
            // 小于1天
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            
            // 小于7天
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
            
            // 超过7天显示具体日期
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        } catch (error) {
            return '未知时间';
        }
    }
    
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
