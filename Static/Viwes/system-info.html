<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统信息</title>
    <script src="/Static/Script/global-notifications.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f6f6f6;
            padding: 24px;
            color: #333;
            line-height: 1.5;
        }
        
        .page-header {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .page-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: #111;
        }
        
        .page-description {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }
        
        .refresh-info {
            font-size: 12px;
            color: #888;
        }
        
        .loading {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }
        
        .error {
            background: #fff2f2;
            border: 1px solid #ffd6d6;
            border-radius: 8px;
            padding: 14px;
            color: #d93030;
            margin-bottom: 20px;
        }
        
        .info-card {
            background: #fff;
            border-radius: 12px;
            padding: 22px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        
        .info-card h3 {
            font-size: 17px;
            font-weight: 600;
            color: #111;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .info-grid {
            display: block;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f2f2f2;
            flex-wrap: wrap;
            gap: 4px;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-size: 13px;
            color: #666;
        }
        
        .info-value {
            font-size: 13px;
            font-weight: 500;
            color: #111;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .ip-address {
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            background: #f8f9fa;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #e9ecef;
        }
        
        .copy-button {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #666;
            transition: all 0.2s ease;
        }
        
        .copy-button:hover {
            background: #e9ecef;
            border-color: #dee2e6;
            color: #333;
        }
        
        .copy-button:active {
            transform: scale(0.95);
        }
        
        .copy-button svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
        
        .copy-button.copied {
            background: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .status-online { background: #0cca7a; }
        .status-offline { background: #ff4747; }
        .status-warning { background: #ffaa2e; }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            transition: width 0.25s ease;
            position: absolute;
            left: 0;
            top: 0;
        }
        
        .progress-fill-blue {
            background: #4096ff;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f0f0f0;
            border-top: 2px solid #555;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .icon {
            vertical-align: middle;
            width: 20px;
            height: 20px;
        }
        
        .action-button {
            background: #4096ff;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .action-button:hover {
            background: #3086e8;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(64, 150, 255, 0.3);
        }
        
        .action-button:active {
            transform: translateY(0);
        }
        
        .action-button.danger {
            background: #ff4747;
        }
        
        .action-button.danger:hover {
            background: #ff3737;
            box-shadow: 0 2px 8px rgba(255, 71, 71, 0.3);
        }
        
        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: #fff;
            margin: 5% auto;
            border-radius: 12px;
            width: 90%;
            max-width: 1200px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        .modal-header {
            padding: 20px 24px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .close-button {
            background: none;
            border: none;
            font-size: 28px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: background-color 0.2s ease;
        }
        
        .close-button:hover {
            background-color: #e9ecef;
            color: #333;
        }
        
        .modal-body {
            padding: 24px;
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* 日志控件样式 */
        .log-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .log-filters {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .log-filters label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }
        
        .log-filters select {
            padding: 6px 12px;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            font-size: 13px;
            background: white;
            cursor: pointer;
        }
        
        /* 日志内容样式 */
        .log-content {
            flex: 1;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        /* 日志行样式 */
        .log-line {
            margin-bottom: 8px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .log-line:last-child {
            border-bottom: none;
        }
        
        .log-timestamp {
            color: #6c757d;
        }
        
        .log-level {
            font-weight: 600;
        }
        
        .log-level.TRACE {
            color: #6f42c1;
        }
        
        .log-level.DEBUG {
            color: #17a2b8;
        }
        
        .log-level.INFO {
            color: #28a745;
        }
        
        .log-level.WARN {
            color: #ffc107;
        }
        
        .log-level.ERROR {
            color: #dc3545;
        }
        
        .log-level.FATAL {
            color: #856404;
        }
        
        .log-type {
            color: #007bff;
            font-weight: 500;
        }
        
        .log-message {
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div>
            <h2>系统信息</h2>
            <p class="page-description">查看系统运行状态和详细信息</p>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <button id="viewLogsBtn" class="action-button">查看日志</button>
            <button id="clearLogsBtn" class="action-button danger">清空日志</button>
            <div class="refresh-info" id="refresh-info">
                正在加载...
            </div>
        </div>
    </div>
    
    <div id="content">
        <div class="loading">
            <div class="spinner"></div>
            正在获取系统信息...
        </div>
    </div>

    <!-- 日志查看模态框 -->
    <div id="logsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>系统日志</h3>
                <button class="close-button" id="closeLogsModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="log-controls">
                    <div class="log-filters">
                        <label for="logLevel">日志级别:</label>
                        <select id="logLevel">
                            <option value="ALL">全部</option>
                            <option value="TRACE">TRACE</option>
                            <option value="DEBUG">DEBUG</option>
                            <option value="INFO" selected>INFO</option>
                            <option value="WARN">WARN</option>
                            <option value="ERROR">ERROR</option>
                            <option value="FATAL">FATAL</option>
                        </select>
                        
                        <label for="logType">日志类型:</label>
                        <select id="logType">
                            <option value="ALL">全部</option>
                            <option value="NETWORK">NETWORK</option>
                            <option value="SYSTEM">SYSTEM</option>
                            <option value="BUSINESS">BUSINESS</option>
                            <option value="UNKNOWN">UNKNOWN</option>
                        </select>
                    </div>
                    <button id="refreshLogsBtn" class="action-button">刷新日志</button>
                </div>
                <div class="log-content" id="logContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        正在加载日志...
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    let systemInfoData = null;
    let refreshInterval = null;
    let isPageVisible = true;
    let lastRefreshTime = null;
    let refreshCount = 0;
    
    document.addEventListener('DOMContentLoaded', function() {
        loadSystemInfo();
        startAutoRefresh();
        
        // 绑定日志相关事件
        bindLogsEvents();
    });
    
    /**
     * 绑定日志相关事件
     */
    function bindLogsEvents() {
        // 查看日志按钮点击事件
        document.getElementById('viewLogsBtn').addEventListener('click', function() {
            openLogsModal();
        });
        
        // 关闭日志模态框
        document.getElementById('closeLogsModal').addEventListener('click', function() {
            closeLogsModal();
        });
        
        // 刷新日志按钮点击事件
        document.getElementById('refreshLogsBtn').addEventListener('click', function() {
            loadLogs();
        });
        
        // 日志级别和类型过滤器变化事件
        document.getElementById('logLevel').addEventListener('change', function() {
            loadLogs();
        });
        
        document.getElementById('logType').addEventListener('change', function() {
            loadLogs();
        });
        
        // 点击模态框外部关闭
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('logsModal');
            if (event.target === modal) {
                closeLogsModal();
            }
        });
        
        // 清空日志按钮点击事件
        document.getElementById('clearLogsBtn').addEventListener('click', function() {
            clearLogs();
        });
    }
    
    window.addEventListener('beforeunload', function() {
        stopAutoRefresh();
    });
    
    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(function() {
            if (isPageVisible) loadSystemInfo();
        }, 1000);
    }
    
    function stopAutoRefresh() {
        if (refreshInterval) {
            clearInterval(refreshInterval);
            refreshInterval = null;
        }
    }
    
    async function loadSystemInfo() {
        const content = document.getElementById('content');
        const refreshInfo = document.getElementById('refresh-info');
        
        try {
            if (!systemInfoData) {
                content.innerHTML = '<div class="loading"><div class="spinner"></div>正在获取系统信息... (实时更新)</div>';
            }
            
            const response = await fetch('http://localhost:5726/systeminfo');
            if (!response.ok) {
                throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
            }
            
            systemInfoData = await response.json();
            renderSystemInfo(systemInfoData);
            
            lastRefreshTime = new Date();
            refreshCount++;
            updateRefreshInfo();
            
            // 显示成功提示（每30次刷新显示一次，避免频繁打扰）
            if (refreshCount % 30 === 0) {
                notification.success('系统信息已更新', null, 2000);
            }
            
        } catch (error) {
            console.error('获取系统信息失败:', error);
            
            let errorMessage = error.message;
            if (error.message.includes('Failed to fetch')) {
                errorMessage = '无法连接到服务器，请检查网络连接';
            } else if (error.message.includes('HTTP错误')) {
                errorMessage = `服务器返回错误: ${error.message}`;
            }
            
            // 使用全局消息提示系统显示错误
            notification.error(errorMessage, '获取系统信息失败', 5000);
            
            content.innerHTML = `
                <div class="error">
                    <strong>获取系统信息失败</strong><br>
                    ${errorMessage}<br>
                    <small>请确保HTTP服务器正在运行 (http://localhost:5726)</small>
                </div>
            `;
            
            refreshInfo.textContent = '获取失败';
            refreshInfo.style.color = '#dc2626';
        }
    }
    
    function updateRefreshInfo() {
        const refreshInfo = document.getElementById('refresh-info');
        if (lastRefreshTime) {
            const timeStr = lastRefreshTime.toLocaleTimeString();
            refreshInfo.textContent = `实时更新中... ${timeStr}`;
            refreshInfo.style.color = '#666';
        }
    }
    
    // 计算进程内存占总内存比例
    function getProcessMemoryPercent(data) {
        try {
            const totalGB = parseFloat(data.memory.total);
            const rssMB = parseFloat(data.process.memory.rss);
            const totalMB = totalGB * 1024;
            return Math.min(100, Math.max(0, (rssMB / totalMB) * 100)).toFixed(1);
        } catch (e) {
            return 0;
        }
    }
    
    function renderSystemInfo(data) {
        const content = document.getElementById('content');
        if (!data) {
            content.innerHTML = '<div class="error">没有可用的系统信息</div>';
            return;
        }
        
        const cpuUsageColor = getUsageColor(data.cpu.usage);
        const memoryUsageColor = getUsageColor(data.memory.usage);
        const processPercent = getProcessMemoryPercent(data);
        
        const html = `
            <div class="info-card">
                <h3>
                    
                    系统状态
                </h3>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">操作系统</span>
                        <span class="info-value">${data.os.platform} ${data.os.arch}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">主机名</span>
                        <span class="info-value">${data.os.hostname}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">系统运行时间</span>
                        <span class="info-value">${data.os.uptime}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">CPU使用率</span>
                        <span class="info-value" style="color: ${cpuUsageColor}">${data.cpu.usage}%</span>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${data.cpu.usage}%; background: ${cpuUsageColor}"></div>
                        </div>
                    </div>
                    <div class="info-item">
                        <span class="info-label">总内存</span>
                        <span class="info-value">${data.memory.total}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">已用内存</span>
                        <span class="info-value">${data.memory.used}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">可用内存</span>
                        <span class="info-value">${data.memory.free}</span>
                    </div>

                    <!-- 内存使用率：其它占用 + 本应用 -->
                    <div class="info-item">
                        <span class="info-label">内存使用率</span>
                        <span class="info-value">
                            <span style="color:${memoryUsageColor}">其它 ${data.memory.usage}%</span>
                            <span style="color:#4096ff; margin-left:4px">本应用 ${processPercent}%</span>
                        </span>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${data.memory.usage}%; background:${memoryUsageColor}"></div>
                            <div class="progress-fill progress-fill-blue" style="width:${processPercent}%"></div>
                        </div>
                    </div>

                    <div class="info-item">
                        <span class="info-label">进程PID</span>
                        <span class="info-value">${data.process.pid}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Node.js版本</span>
                        <span class="info-value">${data.process.version}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">进程运行时间</span>
                        <span class="info-value">${data.process.uptime}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">进程内存使用</span>
                        <span class="info-value">${data.process.memory.rss}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">服务器状态</span>
                        <span class="info-value">
                            <span class="status-indicator status-online"></span>
                            ${data.server.status}
                        </span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">监听端口</span>
                        <span class="info-value">${data.server.port}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">服务器运行时间</span>
                        <span class="info-value">${data.server.uptime}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">主机地址</span>
                        <span class="info-value">${data.server.host}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">本地IPv4地址</span>
                        <span class="info-value">
                            ${data.network.primaryIPv4 ? `
                                <span class="ip-address">${data.network.primaryIPv4}</span>
                                <button class="copy-button" onclick="copyToClipboard('${data.network.primaryIPv4}', this)" title="复制IP地址">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                                    </svg>
                                    复制
                                </button>
                            ` : '无'}
                        </span>
                    </div>
                    ${data.network.primaryIPv6 ? `
                    <div class="info-item">
                        <span class="info-label">公网IPv6地址</span>
                        <span class="info-value">
                            <span class="ip-address">${data.network.primaryIPv6}</span>
                            <button class="copy-button" onclick="copyToClipboard('${data.network.primaryIPv6}', this)" title="复制IPv6地址">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                                </svg>
                                复制
                            </button>
                        </span>
                    </div>
                    ` : ''}
                    <div class="info-item">
                        <span class="info-label">网络类型</span>
                        <span class="info-value">${data.network.networkType === 'lan' ? '局域网' : data.network.networkType === 'wan' ? '公网' : '无'}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">网络接口数</span>
                        <span class="info-value">${data.network.interfaceCount}</span>
                    </div>
                </div>
            </div>
        `;
        
        content.innerHTML = html;
        updateRefreshInfo();
    }
    
    function getUsageColor(usage) {
        if (usage < 50) return '#0cca7a';
        if (usage < 80) return '#ffaa2e';
        return '#ff4747';
    }
    
    /**
     * 打开日志模态框
     */
    function openLogsModal() {
        const modal = document.getElementById('logsModal');
        modal.style.display = 'block';
        loadLogs(); // 加载日志
    }
    
    /**
     * 关闭日志模态框
     */
    function closeLogsModal() {
        const modal = document.getElementById('logsModal');
        modal.style.display = 'none';
    }
    
    /**
     * 加载日志
     */
    async function loadLogs() {
        const logContent = document.getElementById('logContent');
        const logLevel = document.getElementById('logLevel').value;
        const logType = document.getElementById('logType').value;
        
        try {
            logContent.innerHTML = '<div class="loading"><div class="spinner"></div>正在加载日志...</div>';
            
            // 构建请求参数
            const params = new URLSearchParams();
            if (logLevel !== 'ALL') {
                params.append('level', logLevel);
            }
            if (logType !== 'ALL') {
                params.append('type', logType);
            }
            
            // 发送请求获取日志
            const response = await fetch(`http://localhost:5726/logs?${params.toString()}`);
            if (!response.ok) {
                throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
            }
            
            const logs = await response.json();
            displayLogs(logs);
            
        } catch (error) {
            console.error('获取日志失败:', error);
            logContent.innerHTML = `<div class="error">无法加载日志: ${error.message}</div>`;
        }
    }
    
    /**
     * 清空日志
     */
    async function clearLogs() {
        // 确认对话框
        const confirmed = confirm('确定要清空所有日志吗？此操作不可逆。');
        if (!confirmed) {
            return;
        }
        
        try {
            // 发送清空日志请求
            const response = await fetch('http://localhost:5726/logs/clear', {
                method: 'POST'
            });
            
            if (!response.ok) {
                throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
            }
            
            const result = await response.json();
            
            // 显示成功消息
            notification.success(result.message || '日志已成功清空', '清空日志成功', 3000);
            
            // 如果日志模态框是打开的，重新加载日志
            const logsModal = document.getElementById('logsModal');
            if (logsModal.style.display === 'block') {
                loadLogs();
            }
            
        } catch (error) {
            console.error('清空日志失败:', error);
            notification.error(`清空日志失败: ${error.message}`, '错误', 5000);
        }
    }
    
    /**
     * 显示日志
     */
    function displayLogs(logs) {
        const logContent = document.getElementById('logContent');
        
        if (!logs || logs.length === 0) {
            logContent.innerHTML = '<div style="color: #666; text-align: center; padding: 20px;">没有找到日志记录</div>';
            return;
        }
        
        // 格式化日志显示
        const logHTML = logs.map(log => {
            return `
                <div class="log-line">
                    <span class="log-timestamp">[${log.timestamp}]</span>
                    <span class="log-level ${log.level}">[${log.level}]</span>
                    <span class="log-type">[${log.type}]</span>
                    <span class="log-message">${log.message}</span>
                </div>
            `;
        }).join('');
        
        logContent.innerHTML = logHTML;
        
        // 滚动到底部显示最新日志
        logContent.scrollTop = logContent.scrollHeight;
    }
    
    /**
     * 复制到剪贴板功能
     */
    async function copyToClipboard(text, button) {
        try {
            await navigator.clipboard.writeText(text);
            
            // 视觉反馈
            button.classList.add('copied');
            const originalHTML = button.innerHTML;
            button.innerHTML = `
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
                已复制
            `;
            
            // 显示全局通知
            notification.success(`已复制: ${text}`, '复制成功', 2000);
            
            // 2秒后恢复原状
            setTimeout(() => {
                button.classList.remove('copied');
                button.innerHTML = originalHTML;
            }, 2000);
            
        } catch (err) {
            console.error('复制失败:', err);
            notification.error('复制失败，请手动选择复制', '错误', 3000);
        }
    }
</script>
</body>
</html>
