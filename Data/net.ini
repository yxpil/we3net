[Network]
ActiveUPnP=false
ActivePCP=false
DestroyUPnPOnExit=false
DestroyPCPOnExit=false
ListenIPv4=true
ListenIPv6=true
UDPHolePunching=false
AllowAsRelay=true

[Server]
Host=0.0.0.0
Port=5726
ExternalAccess=true
MaxConnections=100
Timeout=30000

[Security]
AllowExternalAccess=true
LocalOnlyEndpoints=true
TrustedProxies=127.0.0.1,::1
RateLimiting=true

[Sharing]
BroadcastIdentity=true
ShareVideoWithNonFriends=true
SharePostsWithNonFriends=true

[STUN]
STUNServer=stun.example.com:3478