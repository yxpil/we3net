<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布视频 - 本地内容管理</title>
    <script src="/Static/Script/global-notifications.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f6f6f6;
            padding: 24px;
            color: #333;
            line-height: 1.5;
        }
        
        .page-header {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eaeaea;
        }
        
        .page-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: #111;
        }
        
        .page-description {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }
        
        .tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 20px;
            border-bottom: 1px solid #eaeaea;
        }
        
        .tab {
            background: none;
            border: none;
            padding: 12px 16px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }
        
        .tab:hover {
            color: #333;
        }
        
        .tab.active {
            color: #111;
            border-bottom-color: #111;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .info-card {
            background: #fff;
            border-radius: 12px;
            padding: 22px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #111;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            font-size: 14px;
            color: #333;
            background: #fff;
            transition: border-color 0.2s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #4096ff;
        }
        
        .form-textarea {
            width: 100%;
            min-height: 100px;
            padding: 10px 12px;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            font-size: 14px;
            color: #333;
            background: #fff;
            resize: vertical;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }
        
        .form-textarea:focus {
            outline: none;
            border-color: #4096ff;
        }
        
        .tag-input-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            min-height: 40px;
            padding: 8px 12px;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            background: #fff;
        }
        
        .tag {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .tag-remove {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .tag-remove:hover {
            color: #d93030;
        }
        
        .tag-input {
            border: none;
            outline: none;
            background: none;
            font-size: 14px;
            color: #333;
            flex: 1;
            min-width: 100px;
        }
        
        .video-upload {
            border: 2px dashed #e9ecef;
            border-radius: 6px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .video-upload:hover {
            border-color: #4096ff;
            background: #f8f9ff;
        }
        
        .video-upload.has-video {
            border-style: solid;
            border-color: #4096ff;
            background: #f8f9ff;
            padding: 20px;
        }
        
        .video-upload video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 4px;
            margin-top: 10px;
        }
        
        .video-info {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
        
        .submit-button {
            background: #111;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        
        .submit-button:hover {
            background: #333;
        }
        
        .submit-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* 发布历史样式 */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .history-item {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s ease;
        }
        
        .history-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }
        
        .history-item-title {
            font-size: 16px;
            font-weight: 500;
            color: #111;
            margin-bottom: 4px;
        }
        
        .history-item-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .history-item-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        
        .history-item-tag {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 11px;
            color: #666;
        }
        
        .history-item-description {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            margin-bottom: 8px;
        }
        
        .history-item-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .history-item-view {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            color: #666;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .history-item-view:hover {
            background: #e9ecef;
            color: #333;
        }
        
        .history-item-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        
        .history-item-delete:hover {
            background: #c82333;
        }
        
        .history-item-delete:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        
        .history-empty {
            text-align: center;
            padding: 48px 24px;
            color: #999;
        }
        
        .history-empty svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        
        .loading {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }
        
        .error {
            background: #fff2f2;
            border: 1px solid #ffd6d6;
            border-radius: 8px;
            padding: 14px;
            color: #d93030;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h2>发布视频</h2>
        <p class="page-description">创建和管理本地视频内容</p>
    </div>
    
    <!-- 选项卡 -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('publish')">发布视频</button>
        <button class="tab" onclick="switchTab('history')">发布历史</button>
    </div>
    
    <!-- 发布视频选项卡 -->
    <div class="tab-content active" id="publishTab">
        <div class="info-card">
            <form id="videoForm">
                <div class="form-group">
                    <label class="form-label">标题</label>
                    <input type="text" id="videoTitle" class="form-input" placeholder="请输入视频标题">
                </div>
                
                <div class="form-group">
                    <label class="form-label">标签</label>
                    <div class="tag-input-container" id="tagContainer">
                        <input type="text" id="tagInput" class="tag-input" placeholder="输入标签后按回车添加">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">视频文件</label>
                    <div class="video-upload" onclick="selectVideo()" id="videoUpload">
                        <input type="file" id="videoFile" accept="video/*" style="display: none;" onchange="handleVideoSelect(this)">
                        <div id="uploadContent">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14,2 14,8 20,8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                                <polyline points="10,9 9,9 8,9"/>
                            </svg>
                            <p>点击选择视频文件</p>
                        </div>
                    </div>
                    <div class="video-info" id="videoInfo" style="display: none;"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">简介</label>
                    <textarea id="videoDescription" class="form-textarea" placeholder="请输入视频简介（可选）"></textarea>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="submit-button" id="submitButton">发布视频</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 发布历史选项卡 -->
    <div class="tab-content" id="historyTab">
        <div class="info-card">
            <div id="historyContent">
                <div class="loading">正在加载发布历史...</div>
            </div>
        </div>
    </div>

<script>
    let tags = [];
    let selectedVideo = null;
    
    /**
     * 初始化页面
     */
    function init() {
        // 绑定标签输入事件
        document.getElementById('tagInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addTag(this.value.trim());
                this.value = '';
            }
        });
        
        // 绑定表单提交事件
        document.getElementById('videoForm').addEventListener('submit', submitVideo);
        
        // 初始化发布历史
        loadPublishHistory();
    }
    
    /**
     * 切换选项卡
     */
    function switchTab(tabName) {
        // 更新选项卡状态
        document.querySelectorAll('.tab').forEach(tab => {
            tab.classList.remove('active');
        });
        event.target.classList.add('active');
        
        // 更新内容显示
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.remove('active');
        });
        document.getElementById(tabName + 'Tab').classList.add('active');
        
        // 如果切换到历史选项卡，刷新历史记录
        if (tabName === 'history') {
            loadPublishHistory();
        }
    }
    
    /**
     * 添加标签
     */
    function addTag(tagName) {
        if (!tagName || tags.includes(tagName)) return;
        
        tags.push(tagName);
        renderTags();
    }
    
    /**
     * 移除标签
     */
    function removeTag(tagName) {
        tags = tags.filter(tag => tag !== tagName);
        renderTags();
    }
    
    /**
     * 渲染标签
     */
    function renderTags() {
        const container = document.getElementById('tagContainer');
        const input = document.getElementById('tagInput');
        
        // 清除现有标签
        container.querySelectorAll('.tag').forEach(tag => tag.remove());
        
        // 添加标签
        tags.forEach(tag => {
            const tagElement = document.createElement('div');
            tagElement.className = 'tag';
            tagElement.innerHTML = `
                ${escapeHtml(tag)}
                <button type="button" class="tag-remove" onclick="removeTag('${escapeHtml(tag)}')">×</button>
            `;
            container.insertBefore(tagElement, input);
        });
    }
    
    /**
     * 选择视频
     */
    function selectVideo() {
        document.getElementById('videoFile').click();
    }
    
    /**
     * 处理视频选择
     */
    function handleVideoSelect(input) {
        const file = input.files[0];
        if (!file) return;
        
        selectedVideo = file;
        
        // 更新上传区域显示
        const uploadContent = document.getElementById('uploadContent');
        const videoUpload = document.getElementById('videoUpload');
        const videoInfo = document.getElementById('videoInfo');
        
        videoUpload.classList.add('has-video');
        
        // 创建视频预览
        const video = document.createElement('video');
        video.src = URL.createObjectURL(file);
        video.controls = true;
        video.style.maxWidth = '100%';
        video.style.maxHeight = '300px';
        video.style.borderRadius = '4px';
        
        uploadContent.innerHTML = '';
        uploadContent.appendChild(video);
        
        // 显示视频信息
        const sizeInMB = (file.size / (1024 * 1024)).toFixed(2);
        videoInfo.innerHTML = `
            <div><strong>文件名:</strong> ${escapeHtml(file.name)}</div>
            <div><strong>大小:</strong> ${sizeInMB} MB</div>
            <div><strong>类型:</strong> ${file.type}</div>
        `;
        videoInfo.style.display = 'block';
    }
    
    /**
     * 提交视频
     */
    async function submitVideo(e) {
        e.preventDefault();
        
        const title = document.getElementById('videoTitle').value.trim();
        if (!title) {
            notification.error('请输入视频标题');
            return;
        }
        
        if (!selectedVideo) {
            notification.error('请选择视频文件');
            return;
        }
        
        const submitButton = document.getElementById('submitButton');
        submitButton.disabled = true;
        submitButton.textContent = '发布中...';
        
        const videoData = {
            title: title,
            description: document.getElementById('videoDescription').value.trim(),
            tags: tags,
            author: '本地用户'
        };
        
        try {
            // 使用多种连接方式，适配不同环境
            const endpoints = [
                'http://127.0.0.1:5726/content/videos',
                'http://localhost:5726/content/videos',
                '/content/videos'
            ];
            
            let response = null;
            let lastError = null;
            
            for (const endpoint of endpoints) {
                try {
                    console.log(`尝试连接发布端点: ${endpoint}`);
                    
                    const formData = new FormData();
                    formData.append('video', selectedVideo);
                    formData.append('data', JSON.stringify(videoData));
                    
                    response = await fetch(endpoint, {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (response.ok) {
                        console.log(`✅ 发布连接成功: ${endpoint}`);
                        break;
                    }
                } catch (err) {
                    console.log(`❌ 发布连接失败: ${endpoint}`, err.message);
                    lastError = err;
                }
            }
            
            if (!response || !response.ok) {
                console.error('所有发布连接方式都失败了', lastError);
                notification.error('发布失败，请检查网络连接');
                return;
            }
            
            const result = await response.json();
            
            if (result.success) {
                notification.success('视频发布成功！');
                
                // 重置表单
                document.getElementById('videoForm').reset();
                tags = [];
                selectedVideo = null;
                renderTags();
                
                // 重置视频上传区域
                const uploadContent = document.getElementById('uploadContent');
                const videoUpload = document.getElementById('videoUpload');
                const videoInfo = document.getElementById('videoInfo');
                
                videoUpload.classList.remove('has-video');
                uploadContent.innerHTML = `
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14,2 14,8 20,8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10,9 9,9 8,9"/>
                    </svg>
                    <p>点击选择视频文件</p>
                `;
                videoInfo.style.display = 'none';
                
                // 切换到历史选项卡
                switchTab('history');
                document.querySelector('.tab').classList.remove('active');
                document.querySelectorAll('.tab')[1].classList.add('active');
                
            } else {
                notification.error(result.message || '发布失败');
            }
        } catch (error) {
            console.error('发布请求失败:', error);
            notification.error('发布失败，请稍后重试');
        } finally {
            submitButton.disabled = false;
            submitButton.textContent = '发布视频';
        }
    }
    
    /**
     * 加载发布历史
     */
    async function loadPublishHistory() {
        const historyContent = document.getElementById('historyContent');
        historyContent.innerHTML = '<div class="loading">正在加载发布历史...</div>';
        
        try {
            // 使用多种连接方式，适配不同环境
            const endpoints = [
                'http://127.0.0.1:5726/content/videos?limit=20&offset=0',
                'http://localhost:5726/content/videos?limit=20&offset=0',
                '/content/videos?limit=20&offset=0'
            ];
            
            let response = null;
            let lastError = null;
            
            for (const endpoint of endpoints) {
                try {
                    console.log(`尝试连接历史记录端点: ${endpoint}`);
                    response = await fetch(endpoint);
                    if (response.ok) {
                        console.log(`✅ 历史记录连接成功: ${endpoint}`);
                        break;
                    }
                } catch (err) {
                    console.log(`❌ 历史记录连接失败: ${endpoint}`, err.message);
                    lastError = err;
                }
            }
            
            if (!response || !response.ok) {
                console.error('所有历史记录连接方式都失败了', lastError);
                historyContent.innerHTML = '<div class="error">加载历史记录失败: 无法连接到服务器</div>';
                return;
            }
            
            const result = await response.json();
            
            if (result.success && result.data.videos) {
                displayHistory(result.data.videos);
            } else {
                historyContent.innerHTML = '<div class="error">加载历史记录失败: ' + (result.message || '未知错误') + '</div>';
            }
        } catch (error) {
            console.error('加载历史记录失败:', error);
            historyContent.innerHTML = '<div class="error">加载历史记录失败: ' + error.message + '</div>';
        }
    }
    
    /**
     * 显示发布历史
     */
    function displayHistory(videos) {
        const historyContent = document.getElementById('historyContent');
        
        if (!videos || videos.length === 0) {
            historyContent.innerHTML = `
                <div class="history-empty">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14,2 14,8 20,8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10,9 9,9 8,9"/>
                    </svg>
                    <p>暂无发布历史</p>
                </div>
            `;
            return;
        }
        
        const historyList = document.createElement('div');
        historyList.className = 'history-list';
        
        videos.forEach(video => {
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            
            const description = video.description ? 
                video.description.substring(0, 100) + (video.description.length > 100 ? '...' : '') : 
                '暂无简介';
            
            historyItem.innerHTML = `
                <div class="history-item-header">
                    <div>
                        <div class="history-item-title">${escapeHtml(video.title)}</div>
                        <div class="history-item-meta">
                            <span>${escapeHtml(video.author || '匿名用户')}</span>
                            <span>${formatDate(video.createdAt)}</span>
                            <span>${video.views || 0} 次浏览</span>
                            <span>${video.likes || 0} 个点赞</span>
                        </div>
                        ${video.tags && video.tags.length > 0 ? `
                            <div class="history-item-tags">
                                ${video.tags.map(tag => `<span class="history-item-tag">${escapeHtml(tag)}</span>`).join('')}
                            </div>
                        ` : ''}
                        <div class="history-item-description">${escapeHtml(description)}</div>
                    </div>
                </div>
                <div class="history-item-actions">
                    <button class="history-item-view" onclick="viewVideo('${video.id}')">查看详情</button>
                    <button class="history-item-delete" onclick="deleteVideo('${video.id}', this)">删除</button>
                </div>
            `;
            
            historyList.appendChild(historyItem);
        });
        
        historyContent.innerHTML = '';
        historyContent.appendChild(historyList);
    }
    
    /**
     * 查看视频详情
     */
    function viewVideo(videoId) {
        const detailWindow = window.open(`vedio-published.html?id=${videoId}`, '_blank', 'width=800,height=600,scrollbars=yes');
        if (!detailWindow) {
            notification.error('无法打开详情页面，请检查浏览器弹窗设置');
        }
    }
    
    /**
     * 删除视频
     */
    async function deleteVideo(videoId, button) {
        if (!confirm('确定要删除这个视频吗？此操作不可恢复。')) {
            return;
        }
        
        button.disabled = true;
        button.textContent = '删除中...';
        
        try {
            // 使用多种连接方式，适配不同环境
            const endpoints = [
                `http://127.0.0.1:5726/content/videos/${videoId}`,
                `http://localhost:5726/content/videos/${videoId}`,
                `/content/videos/${videoId}`
            ];
            
            let response = null;
            let lastError = null;
            
            for (const endpoint of endpoints) {
                try {
                    console.log(`尝试连接删除端点: ${endpoint}`);
                    response = await fetch(endpoint, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        console.log(`✅ 删除连接成功: ${endpoint}`);
                        break;
                    }
                } catch (err) {
                    console.log(`❌ 删除连接失败: ${endpoint}`, err.message);
                    lastError = err;
                }
            }
            
            if (!response || !response.ok) {
                console.error('所有删除连接方式都失败了', lastError);
                notification.error('删除失败，请稍后重试');
                return;
            }
            
            const result = await response.json();
            
            if (result.success) {
                notification.success('视频删除成功！');
                // 刷新历史记录
                loadPublishHistory();
            } else {
                notification.error(result.message || '删除失败');
                button.disabled = false;
                button.textContent = '删除';
            }
        } catch (error) {
            console.error('删除请求失败:', error);
            notification.error('删除失败，请稍后重试');
            button.disabled = false;
            button.textContent = '删除';
        }
    }
    
    /**
     * HTML转义
     */
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    /**
     * 格式化日期
     */
    function formatDate(dateString) {
        if (!dateString) return '未知时间';
        
        try {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            // 小于1分钟
            if (diff < 60000) return '刚刚';
            
            // 小于1小时
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            
            // 小于1天
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            
            // 小于7天
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
            
            // 超过7天显示具体日期
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        } catch (error) {
            return '未知时间';
        }
    }
    
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', init);
</script>
