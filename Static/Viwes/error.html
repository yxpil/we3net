<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "SF Pro Text", "Arial", sans-serif;
            background: #ffffff;
            padding: 32px;
            color: #333333;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        
        .error-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        
        .error-title {
            font-size: 24px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 16px;
        }
        
        .error-message {
            font-size: 16px;
            color: #666666;
            margin-bottom: 24px;
            max-width: 400px;
        }
        
        .error-details {
            background: #f8f8f8;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #333333;
            max-width: 500px;
            word-break: break-all;
        }
        
        .retry-button {
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .retry-button:hover {
            background: #333333;
        }
    </style>
</head>
<body>
    <div class="error-icon">⚠️</div>
    <h1 class="error-title">页面加载失败</h1>
    <p class="error-message">抱歉，无法加载请求的页面。请检查网络连接或稍后重试。</p>
    <div class="error-details" id="error-details">
        正在获取错误详情...
    </div>
    <button class="retry-button" onclick="retryLoad()">重新加载</button>
    
    <script>
        // 获取URL参数中的错误信息
        function getErrorMessage() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('message') || '未知错误';
        }
        
        // 显示错误详情
        function displayErrorDetails() {
            const errorDetails = document.getElementById('error-details');
            const message = getErrorMessage();
            errorDetails.textContent = `错误详情: ${message}`;
        }
        
        // 重新加载页面
        function retryLoad() {
            // 尝试重新加载父页面的当前页面
            if (window.parent && window.parent.Navigation) {
                window.parent.Navigation.refreshCurrentPage();
            } else {
                // 如果没有父页面导航功能，则刷新当前iframe
                window.location.reload();
            }
        }
        
        // 页面加载时显示错误详情
        document.addEventListener('DOMContentLoaded', function() {
            displayErrorDetails();
        });
    </script>
</body>
</html>
